server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for ALB (no proxy to backend)
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
