# vsrp-sandbox-env — App deploy (CD)
#
# Deploys frontend + backend ECS services using the latest image for
# the selected commit SHA. Images must already exist in ECR (built by
# app-build.yml or a previous deploy).
#
# Manual trigger only (workflow_dispatch) — run AFTER TFC has applied
# any infrastructure changes.
#
# If no image exists for the SHA, the build step runs automatically.
#
name: App Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy frontend'
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy backend'
        type: boolean
        default: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_FRONTEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/vsrp-sandbox-env/frontend
  ECR_BACKEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/vsrp-sandbox-env/backend
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'vsrp-sandbox-env-dev' }}

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: ensure image exists, then deploy
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    if: inputs.deploy_frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if image exists
        id: check-image
        run: |
          if aws ecr describe-images \
            --repository-name vsrp-sandbox-env/frontend \
            --image-ids imageTag=${{ github.sha }} \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Image ${{ github.sha }} found in ECR"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image not found — will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push (fallback)
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Update task definition and deploy
        run: |
          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services frontend \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition --task-definition "$TASK_DEF" \
            --query 'taskDefinition' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' | \
            jq --arg IMAGE "${{ env.ECR_FRONTEND }}:${{ github.sha }}" \
              '.containerDefinitions |= map(if .name == "frontend" then .image = $IMAGE else . end)' > /tmp/taskdef.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service frontend \
            --task-definition "$NEW_TASK_DEF" \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

          echo "Deployed frontend with image: ${{ env.ECR_FRONTEND }}:${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Backend: ensure image exists, then deploy
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    if: inputs.deploy_backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if image exists
        id: check-image
        run: |
          if aws ecr describe-images \
            --repository-name vsrp-sandbox-env/backend \
            --image-ids imageTag=${{ github.sha }} \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Image ${{ github.sha }} found in ECR"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image not found — will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push (fallback)
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: ${{ env.ECR_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Update task definition and deploy
        run: |
          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services backend \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition --task-definition "$TASK_DEF" \
            --query 'taskDefinition' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' | \
            jq --arg IMAGE "${{ env.ECR_BACKEND }}:${{ github.sha }}" \
              '.containerDefinitions |= map(if (.name == "backend" or .name == "backend-init") then .image = $IMAGE else . end)' > /tmp/taskdef.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service backend \
            --task-definition "$NEW_TASK_DEF" \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

          echo "Deployed backend with image: ${{ env.ECR_BACKEND }}:${{ github.sha }}"
