# vsrp-sandbox-env — App release (CD)
#
# Releases frontend + backend ECS services. Images must already exist
# in ECR (built by app-build.yml). If not, builds as fallback.
#
# Manual trigger only (workflow_dispatch) — run AFTER TFC has applied
# any infrastructure changes.
#
name: App Release

on:
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy frontend'
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy backend'
        type: boolean
        default: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_FRONTEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/vsrp-sandbox-env/frontend
  ECR_BACKEND: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-1' }}.amazonaws.com/vsrp-sandbox-env/backend
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'vsrp-sandbox-env-dev' }}

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: resolve image tag, then deploy
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    if: inputs.deploy_frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: resolve
        run: |
          # Try current SHA first, then find most recent image
          SHA="${{ github.sha }}"
          if aws ecr describe-images \
            --repository-name vsrp-sandbox-env/frontend \
            --image-ids imageTag="$SHA" \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Found image for commit SHA: $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No image for $SHA — checking for latest"
            LATEST_TAG=$(aws ecr describe-images \
              --repository-name vsrp-sandbox-env/frontend \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
              --output text \
              --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
            if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "None" ]; then
              echo "Using latest ECR image: $LATEST_TAG"
              echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "No images found — will build"
              echo "tag=$SHA" >> "$GITHUB_OUTPUT"
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.resolve.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push (fallback)
        if: steps.resolve.outputs.needs_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Update task definition and deploy
        run: |
          IMAGE_TAG="${{ steps.resolve.outputs.tag }}"
          echo "Deploying frontend with tag: $IMAGE_TAG"

          # Use the latest registered task def revision (TF always creates a new
          # revision on apply). Do NOT use describe-services here — that returns
          # the currently RUNNING revision, which may predate the latest TF apply.
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition frontend \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition --task-definition "$TASK_DEF" \
            --query 'taskDefinition' | \
            jq '{family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions, volumes, placementConstraints, requiresCompatibilities, cpu, memory, tags, pidMode, ipcMode, proxyConfiguration, inferenceAccelerators, ephemeralStorage, runtimePlatform, enableFaultInjection} | with_entries(select(.value != null))' | \
            jq --arg IMAGE "${{ env.ECR_FRONTEND }}:${IMAGE_TAG}" \
              '.containerDefinitions |= map(if .name == "frontend" then .image = $IMAGE else . end)' > /tmp/taskdef.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service frontend \
            --task-definition "$NEW_TASK_DEF" \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

          echo "Deployed frontend with image: ${{ env.ECR_FRONTEND }}:${IMAGE_TAG}"

  # ---------------------------------------------------------------------------
  # Backend: resolve image tag, then deploy
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    if: inputs.deploy_backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: resolve
        run: |
          SHA="${{ github.sha }}"
          if aws ecr describe-images \
            --repository-name vsrp-sandbox-env/backend \
            --image-ids imageTag="$SHA" \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Found image for commit SHA: $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No image for $SHA — checking for latest"
            LATEST_TAG=$(aws ecr describe-images \
              --repository-name vsrp-sandbox-env/backend \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
              --output text \
              --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
            if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "None" ]; then
              echo "Using latest ECR image: $LATEST_TAG"
              echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "No images found — will build"
              echo "tag=$SHA" >> "$GITHUB_OUTPUT"
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.resolve.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push (fallback)
        if: steps.resolve.outputs.needs_build == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: ${{ env.ECR_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Update task definition and deploy
        run: |
          IMAGE_TAG="${{ steps.resolve.outputs.tag }}"
          echo "Deploying backend with tag: $IMAGE_TAG"

          # Use the latest registered task def revision (TF always creates a new
          # revision on apply). Do NOT use describe-services here — that returns
          # the currently RUNNING revision, which may predate the latest TF apply.
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition backend \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs describe-task-definition --task-definition "$TASK_DEF" \
            --query 'taskDefinition' | \
            jq '{family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions, volumes, placementConstraints, requiresCompatibilities, cpu, memory, tags, pidMode, ipcMode, proxyConfiguration, inferenceAccelerators, ephemeralStorage, runtimePlatform, enableFaultInjection} | with_entries(select(.value != null))' | \
            jq --arg IMAGE "${{ env.ECR_BACKEND }}:${IMAGE_TAG}" \
              '.containerDefinitions |= map(if (.name == "backend" or .name == "backend-init") then .image = $IMAGE else . end)' > /tmp/taskdef.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service backend \
            --task-definition "$NEW_TASK_DEF" \
            --desired-count 1 \
            --region ${{ env.AWS_REGION }}

          echo "Deployed backend with image: ${{ env.ECR_BACKEND }}:${IMAGE_TAG}"
